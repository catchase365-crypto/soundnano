<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mali-G720 丝绒流体</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; filter: contrast(150%) brightness(1.2) saturate(180%); }
        #uploadBtn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer; border-radius: 20px; backdrop-filter: blur(5px); font-family: sans-serif; transition: 0.3s; }
        #uploadBtn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <button id="uploadBtn">导入图片</button>
    <button id="startBtn" style="display:none; position: fixed; top: 20px; left: 130px; z-index: 100; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer; border-radius: 20px; backdrop-filter: blur(5px); font-family: sans-serif; transition: 0.3s;">开始变换</button>
    <button id="lockBtn" style="display:none; position: fixed; top: 20px; left: 240px; z-index: 100; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer; border-radius: 20px; backdrop-filter: blur(5px); font-family: sans-serif; transition: 0.3s;">锁定图片色</button>
    <button id="nextBtn" style="display:none; position: fixed; top: 20px; left: 350px; z-index: 100; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer; border-radius: 20px; backdrop-filter: blur(5px); font-family: sans-serif; transition: 0.3s;">切换图片</button>
    <div id="fullscreenBtn" style="position:fixed; top:0; right:0; width:100px; height:100px; z-index:1000; cursor:pointer;"></div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <canvas id="glCanvas"></canvas>
    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true, alpha: false });

        // --- 钢琴音频合成系统 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        const pianoScale = [0, 2, 4, 7, 9]; // A Minor Pentatonic: A, C, D, E, G

        // --- 卷积混响系统 (模拟空旷回声) ---
        const reverbNode = audioCtx.createConvolver();
        const reverbLen = audioCtx.sampleRate * 3.0;
        const reverbBuf = audioCtx.createBuffer(2, reverbLen, audioCtx.sampleRate);
        for (let c = 0; c < 2; c++) {
            const chan = reverbBuf.getChannelData(c);
            for (let i = 0; i < reverbLen; i++) {
                // 产生带指数衰减的白噪声作为脉冲响应
                chan[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 2.5);
            }
        }
        reverbNode.buffer = reverbBuf;
        reverbNode.connect(audioCtx.destination);
        let lastNoteTime = 0;

        function playPiano(y, intensity = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (now - lastNoteTime < 0.08) return; // 限制触发频率，保持演奏感
            lastNoteTime = now;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            // 映射Y坐标到音高 (覆盖7个八度)
            const normalizedY = (y + 1) * 0.5;
            const octave = Math.floor(normalizedY * 7);
            const noteIdx = Math.floor((normalizedY * 7 % 1) * 5);
            const midi = (octave + 2) * 12 + pianoScale[noteIdx];
            const freq = 440 * Math.pow(2, (midi - 69) / 12);

            osc.type = 'triangle'; // 柔和的三角波模拟钢琴基音
            osc.frequency.setValueAtTime(freq, now);

            filter.type = 'lowpass';
            filter.Q.setValueAtTime(intensity * 5.0, now); // 降低共振峰以防止高频破音
            filter.frequency.setValueAtTime(freq * (1.0 + intensity * 5.0), now);
            filter.frequency.exponentialRampToValueAtTime(freq, now + 1.2);

            gain.gain.setValueAtTime(0, now);
            // 映射力度：intensity越高，音量越大且衰减越慢，增加厚度
            gain.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0 + intensity);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination); // 干声
            gain.connect(reverbNode);           // 湿声 (混响)

            osc.start(now);
            osc.stop(now + 2.0);
        }

        const PARTICLE_COUNT = 1000000; // 增加数量以实现极致粒子效果

        const vsSource = `#version 300 es
        layout(location = 0) in vec2 a_pos;
        layout(location = 1) in float a_id;
        uniform float u_time;
        uniform vec2 u_touches[10];
        uniform int u_touchCount;
        uniform float u_mix;
        uniform bool u_lockColor;
        uniform sampler2D u_texture;
        out vec2 v_pos;
        out vec3 v_color;

        float noise(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }

        void main() {
            vec2 p = a_pos;
            float speed = 0.003;
            float angle = sin(p.x * 4.0 + u_time * 0.8) * 3.0 + cos(p.y * 4.0 + u_time * 0.5) * 3.0;
            
            for(int i = 0; i < 10; i++) {
                if(i >= u_touchCount) break;
                vec2 dir = u_touches[i] - p;
                float dist = length(dir);
                if(dist < 0.6) {
                    float force = (0.6 - dist);
                    angle += (atan(dir.y, dir.x) + 1.57) * force * 2.0;
                    speed += force * 0.03;
                }
            }
            p.x += cos(angle) * speed;
            p.y += sin(angle) * speed;

            // 边界柔和重置
            if(length(p) > 2.0) p = vec2(noise(p + u_time) * 2.0 - 1.0, noise(p.yx - u_time) * 2.0 - 1.0);

            v_pos = p;
            
            // 修改颜色逻辑：高对比度冷暖交替
            float hue = length(p) * 0.5 + sin(u_time * 0.2) * 0.5;
            v_color = mix(
                vec3(0.0, 1.0, 0.8), // 亮青
                vec3(0.5, 0.0, 1.0), // 深紫
                clamp(hue, 0.0, 1.0)
            );
            v_color *= (1.2 + 0.3 * noise(p + u_time));

            // 图像模式逻辑
            float gridSize = sqrt(300000.0);
            vec2 gridPos = vec2(mod(a_id, gridSize) / gridSize, floor(a_id / gridSize) / gridSize) * 2.0 - 1.0;
            gridPos.y *= -1.0;
            vec3 imgColor = texture(u_texture, (gridPos * vec2(1.0, -1.0) + 1.0) * 0.5).rgb;
            
            // 变换过程中的“沙画”抖动：在聚合过程中产生阻尼感与沙砾质感
            float jitterStrength = (1.0 - u_mix) * u_mix;
            vec2 jitter = vec2(noise(vec2(a_id, u_time)), noise(vec2(u_time, a_id))) * 0.15 * jitterStrength;
            vec2 finalPos = mix(p, gridPos + jitter, u_mix);
            
            v_color = u_lockColor ? imgColor : mix(v_color, imgColor, u_mix);
            
            gl_Position = vec4(finalPos, 0.0, 1.0);
            // 粒子呼吸感：让星星点点有微弱的闪烁感
            gl_PointSize = mix(4.5, 3.0, u_mix) * (0.8 + 0.2 * sin(u_time * 2.0 + a_id));
        }`;

        const fsSource = `#version 300 es
        precision highp float;
        in vec3 v_color;
        out vec4 outColor;
        void main() {
            outColor = vec4(v_color, 0.7); // 增加不透明度以提升亮度
        }`;

        // --- 硬件初始化逻辑 ---
        function createShader(gl, type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
        }

        const fadeProg = gl.createProgram();
        const fsFade = createShader(gl, gl.FRAGMENT_SHADER, `#version 300 es\n precision highp float; out vec4 c; void main(){ c = vec4(0.0, 0.0, 0.0, 0.15); }`);
        const vsFade = createShader(gl, gl.VERTEX_SHADER, `#version 300 es\n void main(){ vec2 p[3] = vec2[](vec2(-1.0,-1.0), vec2(3.0,-1.0), vec2(-1.0,3.0)); gl_Position = vec4(p[gl_VertexID], 0.0, 1.0); }`);
        gl.attachShader(fadeProg, vsFade); gl.attachShader(fadeProg, fsFade); gl.linkProgram(fadeProg);
        const vaoFade = gl.createVertexArray();
        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.transformFeedbackVaryings(program, ['v_pos'], gl.INTERLEAVED_ATTRIBS);
        gl.linkProgram(program);

        const posData = new Float32Array(PARTICLE_COUNT * 2);
        for(let i=0; i<posData.length; i++) posData[i] = Math.random() * 2 - 1;

        const idData = new Float32Array(PARTICLE_COUNT);
        for(let i=0; i<idData.length; i++) idData[i] = i;

        function createBuffer(data) {
            const b = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, b);
            gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_COPY);
            return b;
        }

        let bufA = createBuffer(posData);
        let bufB = createBuffer(posData);
        let bufId = createBuffer(idData);

        function createVAO(posBuf) {
            const vao = gl.createVertexArray();
            gl.bindVertexArray(vao);
            gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
            gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(0);
            gl.bindBuffer(gl.ARRAY_BUFFER, bufId);
            gl.vertexAttribPointer(1, 1, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(1);
            return vao;
        }

        let vaoA = createVAO(bufA);
        let vaoB = createVAO(bufB);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

        let curr = { vao: vaoA, write: bufB };
        let next = { vao: vaoB, write: bufA };
        let imgMix = 0, targetMix = 0, isLocked = false, currentImgIdx = 0;
        let textures = [];

        function draw(time) {
            // 1. 动态适配 DPR，确保高清
            const dpr = window.devicePixelRatio || 2;
            if (canvas.width !== window.innerWidth * dpr) {
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
            }
            gl.viewport(0, 0, canvas.width, canvas.height);

            // 2. 实现高效拖尾效果
            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            gl.useProgram(fadeProg);
            gl.bindVertexArray(vaoFade);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

            gl.useProgram(program);
            if(textures.length > 0) {
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, textures[currentImgIdx]);
            }
            gl.uniform1f(gl.getUniformLocation(program, "u_time"), time * 0.001);
            imgMix += (targetMix - imgMix) * 0.05;
            gl.uniform2fv(gl.getUniformLocation(program, "u_touches"), window.touchPoints);
            gl.uniform1i(gl.getUniformLocation(program, "u_touchCount"), window.touchCount);
            gl.uniform1f(gl.getUniformLocation(program, "u_mix"), imgMix);
            gl.uniform1i(gl.getUniformLocation(program, "u_lockColor"), isLocked ? 1 : 0);

            // 随流体律动产生微弱的背景演奏
            if(Math.random() > 0.992) {
                playPiano(Math.sin(time * 0.0005) * 0.8, 0.1 + Math.random() * 0.2);
            }

            gl.bindVertexArray(curr.vao);
            gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, curr.write);
            gl.beginTransformFeedback(gl.POINTS);
            gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
            gl.endTransformFeedback();

            [curr, next] = [next, curr];
            requestAnimationFrame(draw);
        }
        window.touchPoints = new Float32Array(20);
        window.touchCount = 0;
        const updateInteractions = (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.type.startsWith('mouse')) {
                window.touchCount = (e.buttons > 0) ? 1 : 0;
                if (window.touchCount) {
                    window.touchPoints[0] = (e.clientX - rect.left) / rect.width * 2 - 1;
                    window.touchPoints[1] = -((e.clientY - rect.top) / rect.height * 2 - 1);
                    const intensity = (window.touchPoints[0] + 1.0) * 0.5; // X坐标控制力度 (0.0 - 1.0)
                    playPiano(window.touchPoints[1], intensity);
                }
            } else {
                const touches = e.touches;
                window.touchCount = Math.min(touches.length, 10);
                for (let i = 0; i < window.touchCount; i++) {
                    window.touchPoints[i * 2] = (touches[i].clientX - rect.left) / rect.width * 2 - 1;
                    window.touchPoints[i * 2 + 1] = -((touches[i].clientY - rect.top) / rect.height * 2 - 1);
                    const intensity = (window.touchPoints[i * 2] + 1.0) * 0.5;
                    if(Math.random() > 0.7) playPiano(window.touchPoints[i * 2 + 1], intensity);
                }
            }
        };
        ['mousedown', 'mousemove', 'mouseup'].forEach(evt => canvas.addEventListener(evt, updateInteractions));
        ['touchstart', 'touchmove', 'touchend'].forEach(evt => canvas.addEventListener(evt, (e) => {
            e.preventDefault();
            updateInteractions(e);
        }, { passive: false }));

        document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('startBtn').onclick = () => {
            targetMix = targetMix === 0 ? 1 : 0;
            document.getElementById('startBtn').innerText = targetMix === 0 ? '开始变换' : '重置流动';
        };
        document.getElementById('lockBtn').onclick = () => {
            isLocked = !isLocked;
            document.getElementById('lockBtn').innerText = isLocked ? '恢复随机色' : '锁定图片色';
        };
        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };
        document.getElementById('nextBtn').onclick = () => {
            if (textures.length < 2) return;
            imgMix = 0; // 触发瞬间消散效果
            currentImgIdx = (currentImgIdx + 1) % textures.length;
        };

        document.getElementById('fileInput').onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            
            // 清空旧纹理
            textures.forEach(t => gl.deleteTexture(t));
            textures = [];
            currentImgIdx = 0;

            for (const file of files) {
                const img = await new Promise(resolve => {
                    const i = new Image();
                    i.onload = () => resolve(i);
                    i.src = URL.createObjectURL(file);
                });

                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                const targetAspect = 16 / 10;
                tempCanvas.width = 2048;
                tempCanvas.height = 2048 / targetAspect;

                const screenAspect = canvas.width / canvas.height;
                let sw, sh, sx, sy;
                const imgAspect = img.width / img.height;
                if (imgAspect > screenAspect) {
                    sh = img.height; sw = sh * screenAspect; sx = (img.width - sw) / 2; sy = 0;
                } else {
                    sw = img.width; sh = sw / screenAspect; sx = 0; sy = (img.height - sh) / 2;
                }
                tCtx.drawImage(img, sx, sy, sw, sh, 0, 0, tempCanvas.width, tempCanvas.height);

                const tex = gl.createTexture();
                gl.bindTexture(gl.TEXTURE_2D, tex);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tempCanvas);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                textures.push(tex);
            }

            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('lockBtn').style.display = 'block';
            if(textures.length > 1) document.getElementById('nextBtn').style.display = 'block';
            targetMix = 0;
        };
        const oldOnChangeIgnore = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                const screenAspect = canvas.width / canvas.height;
                // 裁剪逻辑：保持比例填充 (Cover)
                let sw, sh, sx, sy;
                const imgAspect = img.width / img.height;
                if (imgAspect > screenAspect) {
                    sh = img.height;
                    sw = sh * screenAspect;
                    sx = (img.width - sw) / 2;
                    sy = 0;
                } else {
                    sw = img.width;
                    sh = sw / screenAspect;
                    sx = 0;
                    sy = (img.height - sh) / 2;
                }
                // 强制按 16:10 比例处理图片以适配平板满屏
                const targetAspect = 16 / 10;
                tempCanvas.width = 2048;
                tempCanvas.height = 2048 / targetAspect;
                tCtx.drawImage(img, sx, sy, sw, sh, 0, 0, tempCanvas.width, tempCanvas.height);

                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tempCanvas);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('lockBtn').style.display = 'block';
                targetMix = 0; // 重置混合状态，等待点击
            };
            img.src = URL.createObjectURL(file);
        };
        draw(0);
    </script>
</body>
</html>
