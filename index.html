<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静谧之境 - 隐形流体钢琴</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui { position: fixed; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-family: sans-serif; pointer-events: none; letter-spacing: 2px; z-index: 10; }
        #piano { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column-reverse; pointer-events: none; }
        .key { flex: 1; border-top: 1px solid rgba(255,255,255,0.05); transition: background 0.4s ease-out; }
        .key.active { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body>
    <div id="ui">双击全屏 | 隐形钢琴：量化视界</div>
    <div id="piano"></div>
    <canvas id="glCanvas"></canvas>
    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });

        // --- 钢琴音频合成系统 (完整保留自 9.9 分版) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        const pianoScale = [0, 2, 4, 7, 9]; 
        const pianoContainer = document.getElementById('piano');
        for(let i=0; i<36; i++) {
            const div = document.createElement('div');
            div.className = 'key';
            pianoContainer.appendChild(div);
        }
        const keyElements = document.getElementsByClassName('key');

        const reverbNode = audioCtx.createConvolver();
        const reverbLen = audioCtx.sampleRate * 3.0;
        const reverbBuf = audioCtx.createBuffer(2, reverbLen, audioCtx.sampleRate);
        for (let c = 0; c < 2; c++) {
            const chan = reverbBuf.getChannelData(c);
            for (let i = 0; i < reverbLen; i++) {
                chan[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 2.5);
            }
        }
        reverbNode.buffer = reverbBuf;
        reverbNode.connect(audioCtx.destination);
        let lastNoteTime = 0;

        function playPiano(y, intensity = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (now - lastNoteTime < 0.08) return; 
            lastNoteTime = now;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            const normalizedY = (y + 1) * 0.5;
            const octave = Math.floor(normalizedY * 7);
            const noteIdx = Math.floor((normalizedY * 7 % 1) * 5);
            const midi = (octave + 2) * 12 + pianoScale[noteIdx];
            const keyIdx = octave * 5 + noteIdx;
            if(keyElements[keyIdx]) {
                keyElements[keyIdx].classList.add('active');
                setTimeout(() => keyElements[keyIdx].classList.remove('active'), 200);
            }
            const freq = 440 * Math.pow(2, (midi - 69) / 12);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now);
            filter.type = 'lowpass';
            filter.Q.setValueAtTime(intensity * 5.0, now);
            filter.frequency.setValueAtTime(freq * (1.0 + intensity * 5.0), now);
            filter.frequency.exponentialRampToValueAtTime(freq, now + 1.2);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0 + intensity);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            gain.connect(reverbNode);
            osc.start(now);
            osc.stop(now + 2.0);
        }

        // --- GPU 物理核心 (保留 100 万粒子，但视觉设为极淡) ---
        const PARTICLE_COUNT = 1000000;
        const vsSource = `#version 300 es
        layout(location = 0) in vec2 a_pos;
        layout(location = 1) in float a_id;
        uniform float u_time;
        uniform vec2 u_touches[10];
        uniform int u_touchCount;
        out vec2 v_pos;
        out float v_alpha;

        float noise(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

        void main() {
            vec2 p = a_pos;
            float speed = 0.003;
            float angle = sin(p.x * 4.0 + u_time * 0.8) * 3.0 + cos(p.y * 4.0 + u_time * 0.5) * 3.0;
            
            float interaction = 0.0;
            for(int i = 0; i < 10; i++) {
                if(i >= u_touchCount) break;
                vec2 dir = u_touches[i] - p;
                float dist = length(dir);
                if(dist < 0.6) {
                    float force = (0.6 - dist);
                    angle += (atan(dir.y, dir.x) + 1.57) * force * 2.0;
                    speed += force * 0.03;
                    interaction += force; // 记录互动强度
                }
            }
            p.x += cos(angle) * speed;
            p.y += sin(angle) * speed;
            if(length(p) > 2.0) p = vec2(noise(p + u_time) * 2.0 - 1.0, noise(p.yx - u_time) * 2.0 - 1.0);
            v_pos = p;
            v_alpha = interaction * 0.5; // 只有互动的地方才会有微弱光芒
            gl_Position = vec4(p, 0.0, 1.0);
            gl_PointSize = 1.0; 
        }`;

        const fsSource = `#version 300 es
        precision highp float;
        in float v_alpha;
        out vec4 outColor;
        void main() {
            if(v_alpha < 0.01) discard;
            outColor = vec4(0.4, 0.6, 1.0, v_alpha * 0.4);
        }`;

        function createShader(gl, type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.transformFeedbackVaryings(program, ['v_pos'], gl.INTERLEAVED_ATTRIBS);
        gl.linkProgram(program);

        const posData = new Float32Array(PARTICLE_COUNT * 2);
        for(let i=0; i<posData.length; i++) posData[i] = Math.random() * 2 - 1;
        const idData = new Float32Array(PARTICLE_COUNT);
        for(let i=0; i<idData.length; i++) idData[i] = i;

        let bufA = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bufA); gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_COPY);
        let bufB = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bufB); gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_COPY);
        let bufId = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, bufId); gl.bufferData(gl.ARRAY_BUFFER, idData, gl.STATIC_DRAW);

        function createVAO(pBuf) {
            const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
            gl.bindBuffer(gl.ARRAY_BUFFER, pBuf); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0); gl.enableVertexAttribArray(0);
            gl.bindBuffer(gl.ARRAY_BUFFER, bufId); gl.vertexAttribPointer(1, 1, gl.FLOAT, false, 0, 0); gl.enableVertexAttribArray(1);
            return vao;
        }
        let vaoA = createVAO(bufA), vaoB = createVAO(bufB);
        let curr = { vao: vaoA, write: bufB }, next = { vao: vaoB, write: bufA };

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

        function draw(time) {
            canvas.width = window.innerWidth * 2; canvas.height = window.innerHeight * 2;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            gl.useProgram(program);
            gl.uniform1f(gl.getUniformLocation(program, "u_time"), time * 0.001);
            gl.uniform2fv(gl.getUniformLocation(program, "u_touches"), window.touchPoints);
            gl.uniform1i(gl.getUniformLocation(program, "u_touchCount"), window.touchCount);
            gl.bindVertexArray(curr.vao);
            gl.bindBufferBase(gl.TRANSFORM_FEEDBACK_BUFFER, 0, curr.write);
            gl.beginTransformFeedback(gl.POINTS);
            gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
            gl.endTransformFeedback();
            [curr, next] = [next, curr];
            requestAnimationFrame(draw);
        }

        window.touchPoints = new Float32Array(20);
        window.touchCount = 0;
        const update = (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) {
                window.touchCount = Math.min(e.touches.length, 10);
                for(let i=0; i<window.touchCount; i++){
                    window.touchPoints[i*2] = (e.touches[i].clientX/rect.width)*2-1;
                    window.touchPoints[i*2+1] = -(e.touches[i].clientY/rect.height)*2+1;
                    if(Math.random()>0.8) playPiano(window.touchPoints[i*2+1], (window.touchPoints[i*2]+1)*0.5);
                }
            } else {
                window.touchCount = (e.buttons>0)?1:0;
                if(window.touchCount){
                    window.touchPoints[0] = (e.clientX/rect.width)*2-1;
                    window.touchPoints[1] = -(e.clientY/rect.height)*2+1;
                    playPiano(window.touchPoints[1], (window.touchPoints[0]+1)*0.5);
                }
            }
        };
        ['mousedown','mousemove','mouseup'].forEach(v=>window.addEventListener(v, update));
        ['touchstart','touchmove','touchend'].forEach(v=>window.addEventListener(v, e=>{e.preventDefault(); update(e);},{passive:false}));
        canvas.addEventListener('dblclick',()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen());
        draw(0);
    </script>
</body>
</html>
